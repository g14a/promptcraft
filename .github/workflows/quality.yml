name: Code Quality

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'

    - name: Install golangci-lint
      run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest

    - name: Run golangci-lint
      run: golangci-lint run --out-format=colored-line-number --timeout=5m

  format:
    name: Check Formatting
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'

    - name: Check if code is formatted
      run: |
        if [ "$(gofmt -s -l . | wc -l)" -gt 0 ]; then
          echo "Code is not formatted. Please run 'gofmt -s -w .'"
          gofmt -s -l .
          exit 1
        fi

    - name: Check if imports are organized
      run: |
        go install golang.org/x/tools/cmd/goimports@latest
        if [ "$(goimports -l . | wc -l)" -gt 0 ]; then
          echo "Imports are not organized. Please run 'goimports -w .'"
          goimports -l .
          exit 1
        fi

  mod-tidy:
    name: Check go.mod
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'

    - name: Check if go.mod is tidy
      run: |
        go mod tidy
        git diff --exit-code go.mod go.sum

  ineffassign:
    name: Check Ineffective Assignments
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'

    - name: Install ineffassign
      run: go install github.com/gordonklaus/ineffassign@latest

    - name: Run ineffassign
      run: ineffassign ./...

  misspell:
    name: Check Spelling
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Install misspell
      run: |
        curl -L -o misspell.tar.gz https://github.com/client9/misspell/releases/download/v0.3.4/misspell_0.3.4_linux_64bit.tar.gz
        tar -zxvf misspell.tar.gz
        sudo mv misspell /usr/local/bin/

    - name: Run misspell
      run: |
        # Skip .golangci.yml as it contains valid linter names that may be flagged as misspellings
        misspell -error $(find . -type f -name "*.go" -o -name "*.md" -o -name "*.yml" -o -name "*.yaml" | grep -v .golangci.yml)